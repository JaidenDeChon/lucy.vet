title: A plan for every practice
description: Our plans are designed to meet the requirements of both small and large veterinary practices. Get the right plan that suits your clinic. Get 2 months free when you choose annual billing.
seo:
  title: Pricing
  description: Choose the plan that's right for you.
navigation.icon: i-lucide-credit-card
plans:
  - title: Basic
    description: A basic plan for small veterinary practices.
    price:
      month: $100
      year: $1000
    button:
      label: Get Started
      color: neutral
      variant: subtle
    features:
      - 10 GB Storage
      - 10 Staff Accounts
      - Full access to all features
  - title: Standard
    description: A standard plan for growing veterinary practices.
    price:
      month: $150
      year: $1500
    highlight: true
    scale: true
    button:
      label: Get Started
    features:
      - 50 GB Storage
      - 50 Staff Accounts
      - Full access to all features
  - title: Premium
    description: A premium plan for large veterinary practices and hospitals.
    price:
      month: $200
      year: $2000
    button:
      label: Get Started
      color: neutral
      variant: subtle
    features:
      - 100+ GB Storage
      - Unlimited Staff Accounts
      - Full access to all features
