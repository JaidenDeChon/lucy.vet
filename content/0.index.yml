title: Level up your [VPMS]{class="text-primary"}.
description: Schedule appointments, generate invoices, manage inventory, and more. Lucy VPMS is the Veterinary Practice Management System that streamlines your clinic operations in the cloud, on any device.
seo:
  title: Lucy VPMS
  description: Schedule appointments, generate invoices, manage inventory, and more. Lucy VPMS is the Veterinary Practice Management System that streamlines your clinic operations in the cloud, on any device.
navigation: false
hero:
  links:
    - label: Watch the demo
      icon: i-lucide-arrow-down
      to: "#watch-the-demo"
      size: xl
    - label: Sign up
      icon: i-lucide-user-plus
      size: xl
      color: primary
      variant: subtle
      to: /get-started
sections:
  - title: Built for veterinary clinics
    description: From solo practitioners to multi-location hospitals, Lucy VPMS scales with your practice and adapts to your unique workflows.
    orientation: horizontal
    features:
      - name: Record keeping made easy
        description: Store and access patient records, treatment history, and medical notes securely in the cloud.
        icon: i-lucide-database
      - name: Appointment scheduling
        description: Intuitive calendar interface for booking appointments, managing availability, and sending automated reminders.
        icon: i-lucide-calendar
      - name: Streamlined billing
        description: Generate invoices, process payments, and manage subscriptions with our integrated billing system.
        icon: i-lucide-credit-card
      - name: Inventory management
        description: Track medications, supplies, and equipment with real-time inventory management and low stock alerts.
        icon: i-lucide-box

  - title: Designed for zero friction
    reverse: true
    description: Lucy VPMS was built with modern web technologies and best practices to ensure a seamless experience.
    id: features
    orientation: horizontal
    features:
      - name: Cloud-based convenience
        description: Access your practice management system from anywhere, on any device, with secure cloud hosting.
        icon: i-lucide-cloud
      - name: User-friendly interface
        description: Clean, intuitive design that minimizes training time and maximizes productivity for your staff.
        icon: i-lucide-layout
      - name: Built in the web
        description: No software to install or maintain. Always up-to-date with the latest features and security patches.
        icon: i-lucide-globe
features:
  title: Everything you need to run your practice
  description: Stop overpaying for lesser tools. Lucy VPMS combines all the essential features you need to manage your veterinary practice in one powerful, easy-to-use platform.
  items:
    - title: Patient Records
      description: Securely store and access patient information, treatment history, and medical notes in the cloud.
      icon: i-lucide-database
    - title: Appointment Scheduling
      description: Intuitive calendar interface for booking appointments, managing availability, and sending automated reminders.
      icon: i-lucide-calendar
    - title: Billing & Invoicing
      description: Generate invoices, process payments, and manage subscriptions with our integrated billing system.
      icon: i-lucide-credit-card
    - title: Inventory Management
      description: Track medications, supplies, and equipment with real-time inventory management and low stock alerts.
      icon: i-lucide-box
    - title: Cloud-based Access
      description: Access your practice management system from anywhere, on any device, with secure cloud hosting.
      icon: i-lucide-cloud
    - title: User-friendly Interface
      description: Clean, intuitive design that minimizes training time and maximizes productivity for your staff.
      icon: i-lucide-layout
testimonials:
  headline: Trusted by veterinary clinics
  title: Join our happy customers
  description: See why veterinary practices choose Lucy VPMS to streamline their operations and provide better care for their patients.
  items:
    - quote: Lucy VPMS transformed our practice. Our previous system was clunky and outdated, but Lucy made things so much easier.
      user:
        name: Sarah Chen
        description: Owner of Happy Paws Veterinary Clinic
        avatar:
          src: https://i.pravatar.cc/120?img=1
    - quote: We had an influx of spay and neuter appointments and Lucy's scheduling system handled it flawlessly. Our staff loves how intuitive it is.
      user:
        name: Marcus Rodriguez
        description: Practice Manager at City Vet Hospital
        avatar:
          src: https://i.pravatar.cc/120?img=7
    - quote: The billing system is a game-changer. We can generate invoices and process payments in seconds, which has improved our cash flow significantly.
      user:
        name: David Kumar
        description: CFO at Greenfield Animal Clinic
        avatar:
          src: https://i.pravatar.cc/120?img=3
    - quote: The inventory management features have saved us so much time. We always know what we have in stock and when to reorder. It's saved our butts more than once!
      user:
        name: Emily Zhang
        description: Office Manager at Lakeside Veterinary Center
        avatar:
          src: https://i.pravatar.cc/120?img=5
    - quote: The cloud-based access means I can check clinic records and manage appointments from home or on the go. It's been a lifesaver for our busy practice.
      user:
        name: James Wilson
        description: Veterinarian at Baytowne Animal Hospital
        avatar:
          src: https://i.pravatar.cc/120?img=8
    - quote: The user interface is so clean and intuitive. Our staff picked it up in no time, and it's made our daily operations much smoother.
      user:
        name: Lisa Patel
        description: Clinic Director at Riverbend Veterinary Clinic
        avatar:
          src: https://i.pravatar.cc/120?img=9
    - quote: Support team has been fantastic. Any questions or help we needed, they were quick to respond and resolve our issues.
      user:
        name: Michael Torres
        description: IT Specialist at Woodland Veterinary Hospital
        avatar:
          src: https://i.pravatar.cc/120?img=11
    - quote: I love being able to sign in from my tablet during rounds and access patient records on the spot. It's made my job so much easier.
      user:
        name: Hans Kim
        description: Vet Tech at Baytowne Animal Hospital
        avatar:
          src: https://i.pravatar.cc/120?img=10
    - quote: The looks alone sold me on Lucy VPMS, but the functionality has exceeded all my expectations. It's the best practice management system I've ever used.
      user:
        name: Thomas Weber
        description: Veterinarian at Greenfield Animal Clinic
        avatar:
          src: https://i.pravatar.cc/120?img=12
    - quote: The transition to Lucy VPMS was seamless. The support team helped us every step of the way, and now we can't imagine going back to our old system.
      user:
        name: Sophia Martinez
        description: Practice Manager at Lakeside Veterinary Center
        avatar:
          src: https://i.pravatar.cc/120?img=14
